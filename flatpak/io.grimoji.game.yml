app-id: io.grimoji.game
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: grimoji
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
modules:
  - name: grimoji
    buildsystem: simple
    build-commands:
      - cp -r * /app/bin/
      - chmod +x /app/bin/grimoji
    sources:
      - type: dir
        path: build/linux/x64/release/bundle/
  
  - name: metadata
    buildsystem: simple
    build-commands:
      - install -Dm644 flatpak/io.grimoji.game.desktop /app/share/applications/io.grimoji.game.desktop
      - install -Dm644 assets/icons/512x512.png /app/share/icons/hicolor/512x512/apps/io.grimoji.game.png
    sources:
      - type: file
        path: flatpak/io.grimoji.game.desktop
      - type: file
        path: assets/icons/512x512.png
        dest-filename: grimoji.png