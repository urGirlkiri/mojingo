app-id: io.grimoji.game
runtime: org.freedesktop.Platform
runtime-version: '24.08' 
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.flutter
command: grimoji
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
modules:
  - name: grimoji
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - cp -r * /app/bin/
      - chmod +x /app/bin/grimoji
    sources:
      - type: dir
        path: build/linux/x64/release/bundle/
  
  - name: metadata
    buildsystem: simple
    build-commands:
      - install -Dm644 io.grimoji.game.desktop /app/share/applications/io.grimoji.game.desktop
      - install -Dm644 grimoji.png /app/share/icons/hicolor/512x512/apps/io.grimoji.game.png
    sources:
      - type: file
        path: io.grimoji.game.desktop
      - type: file
        path: grimoji.png