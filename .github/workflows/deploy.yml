name: Grimoji Global Release Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    name: Android, Releases, Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Linux Build Requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev \
            liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install Dependencies
        run: flutter pub get

      - name: Decode Android Secrets
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > upload-keystore.jks

      - name: Create key.properties
        run: |
          cat << EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Optimize Gradle
        run: |
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m" >> android/gradle.properties

      - name: Build Web
        run: flutter build web --base-href "/mojingo/"

      - name: Build Android (AAB & APK)
        run: |
          flutter build appbundle --release
          flutter build apk --release

      - name: Build Linux Desktop (Bundle)
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release

      - name: Package .Deb
        run: |
          mkdir -p debian_build/usr/share/grimoji debian_build/usr/bin debian_build/DEBIAN
          cp -r build/linux/x64/release/bundle/* debian_build/usr/share/grimoji/
          # FIX: Rename binary from Grimoji to grimoji if needed
          if [ -f debian_build/usr/share/grimoji/Grimoji ]; then mv debian_build/usr/share/grimoji/Grimoji debian_build/usr/share/grimoji/grimoji; fi
          ln -s /usr/share/grimoji/grimoji debian_build/usr/bin/grimoji
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          cat <<EOF > debian_build/DEBIAN/control
          Package: grimoji
          Version: $VERSION
          Architecture: amd64
          Maintainer: Kiri <support@grimoji.io>
          Description: Grimoji: Mix & Match Emojis Gothic Alchemy.
          EOF
          dpkg-deb --build debian_build linux-amd64.deb

      - name: Package AppImage
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          # FIX: Rename binary from Grimoji to grimoji if needed
          if [ -f AppDir/usr/bin/Grimoji ]; then mv AppDir/usr/bin/Grimoji AppDir/usr/bin/grimoji; fi
          cat <<EOF > AppDir/grimoji.desktop
          [Desktop Entry]
          Name=Grimoji
          Exec=grimoji
          Icon=grimoji
          Type=Application
          Categories=Game;LogicGame;
          EOF
          cp assets/icons/512x512.png AppDir/grimoji.png
          chmod +x AppDir/usr/bin/grimoji
          ./appimagetool --appimage-extract-and-run AppDir linux-x86_64.AppImage

      - name: Deploy to GitHub Pages
        continue-on-error: true 
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

      - name: Upload to Google Play
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: io.grimoji.game
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: alpha
          status: completed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            linux-amd64.deb
            linux-x86_64.AppImage
            build\windows\x64\runner\Release\windows.msix
          name: "Grimoji Release ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux Bundle for Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/

  build-snap:
    needs: build-and-release
    runs-on: ubuntu-latest
    continue-on-error: true 
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Snap Metadata
        run: |
          mkdir -p snap/gui
          # Copy your existing icon to the place Snapcraft expects it
          cp assets/icons/512x512.png snap/gui/grimoji.png
          
          # Create the .desktop file on the fly
          cat <<EOF > snap/gui/grimoji.desktop
          [Desktop Entry]
          Name=Grimoji
          Comment=Gothic alchemy puzzle game
          Exec=grimoji
          Icon=\${SNAP}/meta/gui/grimoji.png
          Terminal=false
          Type=Application
          Categories=Game;Puzzle;
          EOF
      - uses: subosito/flutter-action@v2
      - uses: snapcore/action-build@v1
        id: snap-build
      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        with:
          snap: ${{ steps.snap-build.outputs.snap }}
          release: edge

  build-windows:
    needs: build-and-release
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - name: Build MSIX
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows . 
          flutter pub get
          flutter build windows --release
          dart run msix:create --store
          ren build\windows\x64\runner\Release\*.msix windows.msix
      - uses: softprops/action-gh-release@v2
        with:
          files: build\windows\x64\runner\Release\windows.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-flatpak:
    needs: build-and-release
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Linux Bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: flatpak/build/linux/x64/release/bundle/
      
      - name: Copy Icon File
        run: cp assets/icons/512x512.png flatpak/grimoji.png
      
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: linux.flatpak
          manifest-path: flatpak/io.grimoji.game.yml
      - uses: softprops/action-gh-release@v2
        with:
          files: linux.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}