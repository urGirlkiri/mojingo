name: Release Pipeline

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Build Requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web App
        run: flutter build web --base-href "/grimoji/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

      - name: Build Android APK
        run: flutter build apk --release

      - name: Enable & Build Linux Desktop
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release

      - name: Package .Deb
        run: |
          mkdir -p debian_build/usr/share/grimoji debian_build/usr/bin debian_build/DEBIAN
          cp -r build/linux/x64/release/bundle/* debian_build/usr/share/grimoji/
          ln -s /usr/share/grimoji/grimoji debian_build/usr/bin/grimoji
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          cat <<EOF > debian_build/DEBIAN/control
          Package: grimoji
          Version: $VERSION
          Architecture: amd64
          Maintainer: Kiri <support@grimoji.io>
          Description: Grimoji: Mix & Match Emojis
           Welcome to Grimoji, the ultimate gothic alchemy puzzle game!
           Step into the shoes of a magical apprentice and learn to brew, mix,
           and transmute your favorite emojis. Grimoji takes the grid-sliding
           mechanics of 2048 and collides them with the explosive chain reactions
           of classic match-3 games.
          EOF
          dpkg-deb --build debian_build linux-amd64.deb

      - name: Package AppImage
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          cat <<EOF > AppDir/grimoji.desktop
          [Desktop Entry]
          Name=Grimoji
          Comment=Grimoji: Mix & Match Emojis - Gothic alchemy puzzle game
          Exec=grimoji
          Icon=grimoji
          Type=Application
          Categories=Game;LogicGame;
          EOF
          
          cat <<EOF > AppDir/AppRun
          #!/bin/sh
          cd "\$(dirname "\$0")"
          exec ./usr/bin/grimoji "\$@"
          EOF
          chmod +x AppDir/AppRun
          
          cp assets/icons/512x512.png AppDir/grimoji.png 
          
          ./appimagetool --appimage-extract-and-run AppDir linux-x86_64.AppImage

      - name: Upload Core Files to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            linux-amd64.deb
            linux-x86_64.AppImage
          name: Grimoji Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-snap:
    name: Build Snap Package
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: snap-build

      - name: Publish Snap
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        with:
          snap: ${{ steps.snap-build.outputs.snap }}
          release: edge 

  build-windows-msix:
    name: Build Windows MSIX
    needs: build-and-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - name: Build MSIX
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release
          dart run msix:create --store
      - name: Upload MSIX
        uses: softprops/action-gh-release@v2
        with:
          files: build\windows\x64\runner\Release\*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
  build-flatpak:
    name: Build Flatpak
    needs: build-and-release
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Flatpak Linter
        run: flatpak-builder-lint manifest io.grimoji.game.yml
        
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: linux.flatpak
          manifest-path: io.grimoji.game.yml
          cache-key: flatpak-builder-${{ github.sha }}
          
      - name: Upload Flatpak to Release
        uses: softprops/action-gh-release@v2
        with:
          files: linux.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  submit-flatpak:
    name: Submit to Flathub
    needs: [build-and-release, build-flatpak]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout original repo
        uses: actions/checkout@v4
      
      - name: Checkout Flathub fork
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.repository.owner.login }}/flathub
          ref: new-pr
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Copy manifest to Flathub
        run: |
          mkdir -p apps
          cp io.grimoji.game.yml apps/
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: new-pr
          branch: ${{ github.event.repository.name }}-submission-${{ github.sha }}
          title: 'Add io.grimoji.game'
          body: |
            ## Flathub Submission
            
            This is an automated submission for Grimoji.
            
            ### App Info
            - **Name**: Grimoji
            - **ID**: io.grimoji.game
            - **Description**: Gothic alchemy puzzle game mixing emojis
            
            ### Build
            - Built from commit: ${{ github.sha }}
            - Source: https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}
            
            Please review and merge if suitable for Flathub.
          commit-message: |
            Add io.grimoji.game
            
            Flathub submission for Grimoji game.
          labels: submission