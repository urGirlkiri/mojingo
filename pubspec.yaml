name: mojingo
description: A game about mixing and collecting Emoji's 

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  audioplayers: ^6.0.0
  go_router: ^17.0.0
  logging: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^8.1.0
  game_levels_scrolling_map: ^0.0.7

dependency_overrides:
  xml: ^6.6.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.0
  test: ^1.24.3
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/map/
    - assets/images/tab/
    - assets/images/level/
    - assets/icons/
    - assets/music/
    - assets/sfx/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#333346"
  adaptive_icon_foreground: "assets/icons/icon-adaptive-foreground.png"

  web:
      generate: true
      image_path: "assets/icons/icon.png" 
      background_color: "#333346"   
      theme_color: "#333346"

flutter_native_splash:
  color: "#1a1a24" 
  image: "assets/icons/icon.png"